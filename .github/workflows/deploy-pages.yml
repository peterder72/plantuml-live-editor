name: CI and Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and unit tests
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Run unit tests
        run: bun run test:unit

  web:
    name: Web browser tests and scenarios
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install browser dependencies
        run: bunx playwright install --with-deps chromium firefox

      - name: Build webpage
        run: bun run build

      - name: Build Cucumber support
        run: bun run build:scenarios

      - name: Run web Cucumber scenarios in Playwright
        run: bun run test:scenarios:web:prepared

      - name: Upload web test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-test-diagnostics
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  vscode:
    name: VS Code tests and scenarios
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Electron dependencies
        run: bunx playwright install-deps chromium

      - name: Build VS Code extension
        run: bun run build:vscode

      - name: Build Cucumber support
        run: bun run build:scenarios

      - name: Run VS Code integration tests
        run: xvfb-run -a bun run test:vscode:integration

      - name: Run VS Code Cucumber scenarios
        run: xvfb-run -a bun run test:scenarios:vscode:prepared

      - name: Upload VS Code test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vscode-test-diagnostics
          path: |
            test-results/
            .vscode-test/user-data/logs/
          if-no-files-found: ignore

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs:
      - quality
      - web
      - vscode
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-vscode:
    name: Publish VS Code extension
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: vscode-marketplace
    runs-on: ubuntu-24.04
    needs:
      - quality
      - web
      - vscode
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag matches extension version
        run: test "v$(bun -p \"require('./vscode/package.json').version\")" = "$GITHUB_REF_NAME"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Publish VS Code extension
        run: bun run publish:vscode
