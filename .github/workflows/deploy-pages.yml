name: CI and Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Run unit tests
        run: bun run test:unit

  web:
    name: Web browser tests and scenarios
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install browser dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if bunx playwright install --with-deps chromium firefox; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Playwright browser installation failed after 3 attempts." >&2
              exit 1
            fi
            sleep "$((attempt * 5))"
          done

      - name: Build webpage
        run: bun run build

      - name: Build Cucumber support
        run: bun run build:scenarios

      - name: Run web Cucumber scenarios in Playwright
        run: bun run test:scenarios:web:prepared

      - name: Stage web release artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          mkdir -p release
          cp dist/index.html "release/plantuml-live-editor-${release_version}.html"

      - name: Upload web release artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v6
        with:
          name: release-html
          path: release/*.html
          if-no-files-found: error

      - name: Upload web test diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: web-test-diagnostics
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  vscode:
    name: VS Code tests and scenarios
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Electron dependencies
        run: bunx playwright install-deps chromium

      - name: Restore cached VS Code test runtime
        uses: actions/cache@v5
        with:
          path: .vscode-test
          key: vscode-test-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.vscode-test-version') }}

      - name: Build VS Code extension
        run: bun run build:vscode

      - name: Build Cucumber support
        run: bun run build:scenarios

      - name: Run VS Code integration tests
        run: dbus-run-session -- xvfb-run -a -s "-screen 0 1440x900x24" bun run test:vscode:integration

      - name: Run VS Code Cucumber scenarios
        run: dbus-run-session -- xvfb-run -a -s "-screen 0 1440x900x24" bun run test:scenarios:vscode:prepared

      - name: Package VS Code release artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          mkdir -p release
          cd vscode
          bunx vsce package --no-dependencies \
            --out "../release/plantuml-live-editor-${release_version}.vsix"

      - name: Upload VS Code release artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v6
        with:
          name: release-vsix
          path: release/*.vsix
          if-no-files-found: error

      - name: Upload VS Code test diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: vscode-test-diagnostics
          path: |
            test-results/
          if-no-files-found: ignore

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs:
      - quality
      - web
      - vscode
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-vscode:
    name: Publish VS Code extension
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: vscode-marketplace
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs:
      - quality
      - web
      - vscode
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag matches extension version
        shell: bash
        run: |
          extension_version="$(bun -p 'require("./vscode/package.json").version')"
          test "v${extension_version}" = "$GITHUB_REF_NAME"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Publish VS Code extension
        run: bun run publish:vscode

  create-release:
    name: Create GitHub release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs:
      - quality
      - web
      - vscode
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Verify release tag matches package versions
        shell: bash
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          root_version="$(node -p 'require("./package.json").version')"
          extension_version="$(node -p 'require("./vscode/package.json").version')"
          changelog_version="$(node -p 'require("./CHANGELOG.json").releases[0].version')"
          test "$release_version" = "$root_version"
          test "$release_version" = "$extension_version"
          test "$release_version" = "$changelog_version"

      - name: Download web release artifact
        uses: actions/download-artifact@v6
        with:
          name: release-html
          path: release

      - name: Download VS Code release artifact
        uses: actions/download-artifact@v6
        with:
          name: release-vsix
          path: release

      - name: Write release notes from changelog
        shell: bash
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          bun scripts/write-release-notes.ts "$release_version" release/release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "release/plantuml-live-editor-${release_version}.html" \
            "release/plantuml-live-editor-${release_version}.vsix" \
            --verify-tag \
            --notes-file release/release-notes.md
